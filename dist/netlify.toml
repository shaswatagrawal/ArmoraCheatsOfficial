[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "functions"

# OAuth2 Callback Handler (Netlify Serverless)
[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/callback"
  status = 200

[[redirects]]
  from = "/payment"
  to = "/payment.html"
  status = 200

[[redirects]]
  from = "/premium"
  to = "/premium.html"
  status = 200

[[redirects]]
  from = "/external"
  to = "/external.html"
  status = 200

[[redirects]]
  from = "/internal"
  to = "/internal.html"
  status = 200

[[redirects]]
  from = "/internal-x64"
  to = "/internal-x64.html"
  status = 200

[[redirects]]
  from = "/internal-x86"
  to = "/internal-x86.html"
  status = 200

[[redirects]]
  from = "/uid-bypass"
  to = "/uid-bypass.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/refund"
  to = "/refund.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
